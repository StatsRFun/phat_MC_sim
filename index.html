<!DOCTYPE html>
<html>
<body>

<h2>Simple Chart Test (No Libraries)</h2>

<button onclick="drawChart()">Click Me</button>

<br><br>

<canvas id="chart" width="400" height="300" style="border:1px solid black;"></canvas>

<script>
function drawChart() {
  alert("Drawing chart...");

  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");

  // Clear canvas
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const data = [5, 10, 3, 8];
  const barWidth = 50;
  const gap = 20;

  for (let i = 0; i < data.length; i++) {
    let x = i * (barWidth + gap) + 20;
    let y = canvas.height - data[i] * 20;

    ctx.fillStyle = "blue";
    ctx.fillRect(x, y, barWidth, data[i] * 20);
  }
}
</script>

</body>
</html>
