<!DOCTYPE html>
<html>
<body>

<h2>Monte Carlo Simulation of p-hat</h2>

<label>Sample Size (n):</label>
<select id="n">
  <option>10</option>
  <option>50</option>
  <option>100</option>
</select>

<br><br>

<label>True Proportion (p):</label>
<input type="number" id="p" value="0.5" step="0.01" min="0" max="1">

<br><br>

<label>Simulations:</label>
<select id="trials">
  <option>100</option>
  <option>500</option>
  <option>1000</option>
</select>

<br><br>

<button onclick="runSimulation()">Run Simulation</button>

<br><br>

<canvas id="chart" width="500" height="300" style="border:1px solid black;"></canvas>

<script>
function simulate(n, p, trials) {
  let results = [];

  for (let i = 0; i < trials; i++) {
    let successes = 0;

    for (let j = 0; j < n; j++) {
      if (Math.random() < p) successes++;
    }

    results.push(successes / n);
  }

  return results;
}

function runSimulation() {
  const n = parseInt(document.getElementById("n").value);
  const p = parseFloat(document.getElementById("p").value);
  const trials = parseInt(document.getElementById("trials").value);

  const data = simulate(n, p, trials);

  
function drawHistogram(data) {
  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");

  // Make canvas wider
  canvas.width = 800;
  canvas.height = 400;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Axis padding
  const padding = 50;

  // Draw axes
  ctx.beginPath();
  ctx.moveTo(padding, padding);
  ctx.lineTo(padding, canvas.height - padding);
  ctx.lineTo(canvas.width - padding, canvas.height - padding);
  ctx.stroke();

  // Labels
  ctx.font = "14px Arial";
  ctx.fillText("p-hat", canvas.width / 2, canvas.height - 10);
  ctx.save();
  ctx.translate(15, canvas.height / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText("Trial", 0, 0);
  ctx.restore();

  // Plot dots
  const xMin = 0;
  const xMax = 1;

  data.forEach((phat, i) => {
    // Map p-hat to x position
    let x = padding + (phat - xMin) / (xMax - xMin) * (canvas.width - 2 * padding);

    // Map trial index to y position
    let y = padding + i / data.length * (canvas.height - 2 * padding);

    ctx.beginPath();
    ctx.arc(x, y, 3, 0, 2 * Math.PI);
    ctx.fillStyle = "blue";
    ctx.fill();
  });
}

  
</script>

</body>
</html>
