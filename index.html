<!DOCTYPE html>
<html>
<body>

<h2>Monte Carlo Simulation of p-hat</h2>

<label>Sample Size (n):</label>
<select id="n">
  <option>30</option>
  <option>60</option>
  <option>90</option>
</select>

<br><br>

<label>True Proportion (p):</label>
<input type="number" id="p" value="0.5" step="0.01" min="0" max="1">

<br><br>

<label>Simulations:</label>
<select id="trials">
  <option>100</option>
  <option>200</option>
  <option>400</option>
  <option>500</option>
</select>

<br><br>

<button onclick="runSimulation()">Run Simulation</button>

<br><br>

<canvas id="chart" width="1100" height="550" style="border:1px solid black;"></canvas>

<script>
function simulate(n, p, trials) {
  let results = [];
  let intervals = [];

  let z = 1.96;

  for (let i = 0; i < trials; i++) {
    let successes = 0;

    for (let j = 0; j < n; j++) {
      if (Math.random() < p) successes++;
    }

    let phat = successes / n;

    let lower = phat - z * Math.sqrt(phat * (1 - phat) / n);
    let upper = phat + z * Math.sqrt(phat * (1 - phat) / n);

    results.push(phat);
    intervals.push({ lower, upper, phat });
  }

  return { results, intervals };
}

function runSimulation() {
  const n = parseInt(document.getElementById("n").value);
  const p = parseFloat(document.getElementById("p").value);
  const trials = parseInt(document.getElementById("trials").value);

  const sim = simulate(n, p, trials);

  drawPlot(sim.results, sim.intervals, p);
}

function drawPlot(data, intervals, trueP) {
  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const padding = 80;

  // --- COVERAGE CALCULATION ---
  let count = 0;
  intervals.forEach(interval => {
    if (interval.lower <= trueP && interval.upper >= trueP) {
      count++;
    }
  });

  let coverage = (count / intervals.length * 100).toFixed(1);

  // --- TITLE ---
  ctx.font = "18px Arial";
  ctx.fillText(
    "95% confidence intervals, " + coverage + "% of the sample intervals obtained included the true proportion π",
    canvas.width / 2 - 350,
    30
  );

  // --- AXES ---
  ctx.beginPath();
  ctx.moveTo(padding, padding);
  ctx.lineTo(padding, canvas.height - padding);
  ctx.lineTo(canvas.width - padding, canvas.height - padding);
  ctx.stroke();

  // X-axis label
  ctx.fillText("Trial", canvas.width / 2, canvas.height - 20);

  // Y-axis label (p-hat with bar)
  ctx.font = "16px Arial";
  ctx.fillText("p̄", padding - 30, padding - 10);

  // --- Y TICKS ---
  for (let i = 0; i <= 10; i++) {
    let val = i / 10;
    let y = canvas.height - padding - val * (canvas.height - 2 * padding);

    ctx.fillText(val.toFixed(1), padding - 50, y + 5);

    ctx.beginPath();
    ctx.moveTo(padding - 5, y);
    ctx.lineTo(padding, y);
    ctx.stroke();
  }

  // --- TRUE p LINE ---
  let yTrue = canvas.height - padding - trueP * (canvas.height - 2 * padding);

  ctx.beginPath();
  ctx.moveTo(padding, yTrue);
  ctx.lineTo(canvas.width - padding, yTrue);
  ctx.strokeStyle = "red";
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = "red";
  ctx.fillText("π", canvas.width - padding + 10, yTrue + 5);

  ctx.strokeStyle = "black";
  ctx.lineWidth = 1;

  // --- CONFIDENCE INTERVALS ---
  intervals.forEach((interval, i) => {
    let x = padding + i / intervals.length * (canvas.width - 2 * padding);

    let yLower = canvas.height - padding - interval.lower * (canvas.height - 2 * padding);
    let yUpper = canvas.height - padding - interval.upper * (canvas.height - 2 * padding);

    if (interval.lower <= trueP && interval.upper >= trueP) {
      ctx.strokeStyle = "green";
    } else {
      ctx.strokeStyle = "red";
    }

    ctx.beginPath();
    ctx.moveTo(x, yLower);
    ctx.lineTo(x, yUpper);
    ctx.stroke();
  });

  // --- DOTS ---
  data.forEach((phat, i) => {
    let x = padding + i / data.length * (canvas.width - 2 * padding);
    let y = canvas.height - padding - phat * (canvas.height - 2 * padding);

    ctx.beginPath();
    ctx.arc(x, y, 3, 0, 2 * Math.PI);
    ctx.fillStyle = "blue";
    ctx.fill();
  });
}
</script>

</body>
</html>
