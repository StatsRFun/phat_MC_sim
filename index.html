<!DOCTYPE html>
<html>
<body>

<h2>Monte Carlo Simulation of p-hat</h2>

<label>Sample Size (n):</label>
<select id="n">
  <option>30</option>
  <option>60</option>
  <option>90</option>
</select>

<br><br>

<label>True Proportion (p):</label>
<input type="number" id="p" value="0.5" step="0.01" min="0" max="1">

<br><br>

<label>Simulations:</label>
<select id="trials">
  <option>100</option>
  <option>200</option>
  <option>400</option>
  <option>500</option>
</select>

<br><br>

<label>Confidence Level:</label>
<select id="conf">
  <option value="1.645">90%</option>
  <option value="1.96" selected>95%</option>
  <option value="2.576">99%</option>
</select>

<br><br>

<button onclick="startSimulation()">Run Simulation</button>
<button onclick="togglePause()">Pause / Resume</button>

<br><br>

<canvas id="chart" width="1100" height="550" style="border:1px solid black;"></canvas>

<script>
let animationIndex = 0;
let paused = false;
let storedData = null;
let storedIntervals = null;
let storedTrueP = null;

// --- SIMULATION ---
function simulate(n, p, trials, z) {
  let results = [];
  let intervals = [];

  for (let i = 0; i < trials; i++) {
    let successes = 0;

    for (let j = 0; j < n; j++) {
      if (Math.random() < p) successes++;
    }

    let phat = successes / n;

    let lower = phat - z * Math.sqrt(phat * (1 - phat) / n);
    let upper = phat + z * Math.sqrt(phat * (1 - phat) / n);

    results.push(phat);
    intervals.push({ lower, upper, phat });
  }

  return { results, intervals };
}

// --- START ---
function startSimulation() {
  const n = parseInt(document.getElementById("n").value);
  const p = parseFloat(document.getElementById("p").value);
  const trials = parseInt(document.getElementById("trials").value);
  const z = parseFloat(document.getElementById("conf").value);

  const sim = simulate(n, p, trials, z);

  storedData = sim.results;
  storedIntervals = sim.intervals;
  storedTrueP = p;

  animationIndex = 0;
  paused = false;

  animate();
}

// --- PAUSE ---
function togglePause() {
  paused = !paused;
  if (!paused) animate();
}

// --- ANIMATION LOOP ---
function animate() {
  if (paused) return;
  if (animationIndex > storedData.length) return;

  drawPlot(
    storedData.slice(0, animationIndex),
    storedIntervals.slice(0, animationIndex),
    storedTrueP
  );

  animationIndex++;

  setTimeout(animate, 20);
}

// --- DRAW ---
function drawPlot(data, intervals, trueP) {
  const canvas = document.getElementById("chart");
  const ctx = canvas.getContext("2d");

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const padding = 80;

  // --- COVERAGE ---
  let count = 0;
  intervals.forEach(interval => {
    if (interval.lower <= trueP && interval.upper >= trueP) {
      count++;
    }
  });

  let coverage = intervals.length > 0
    ? (count / intervals.length * 100).toFixed(1)
    : 0;

  ctx.font = "18px Arial";
  ctx.fillText(
    "Confidence intervals, " + coverage + "% included π",
    canvas.width / 2 - 200,
    30
  );

  // --- AXES ---
  ctx.beginPath();
  ctx.moveTo(padding, padding);
  ctx.lineTo(padding, canvas.height - padding);
  ctx.lineTo(canvas.width - padding, canvas.height - padding);
  ctx.stroke();

  ctx.fillText("Trial", canvas.width / 2, canvas.height - 20);
  ctx.fillText("p̄", padding - 30, padding - 10);

  // Y ticks
  for (let i = 0; i <= 10; i++) {
    let val = i / 10;
    let y = canvas.height - padding - val * (canvas.height - 2 * padding);

    ctx.fillText(val.toFixed(1), padding - 50, y + 5);

    ctx.beginPath();
    ctx.moveTo(padding - 5, y);
    ctx.lineTo(padding, y);
    ctx.stroke();
  }

  // TRUE LINE
  let yTrue = canvas.height - padding - trueP * (canvas.height - 2 * padding);

  ctx.beginPath();
  ctx.moveTo(padding, yTrue);
  ctx.lineTo(canvas.width - padding, yTrue);
  ctx.strokeStyle = "red";
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = "red";
  ctx.fillText("π", canvas.width - padding + 10, yTrue + 5);

  ctx.strokeStyle = "black";
  ctx.lineWidth = 1;

  // INTERVALS
  intervals.forEach((interval, i) => {
    let x = padding + i / storedIntervals.length * (canvas.width - 2 * padding);

    let yLower = canvas.height - padding - interval.lower * (canvas.height - 2 * padding);
    let yUpper = canvas.height - padding - interval.upper * (canvas.height - 2 * padding);

    if (interval.lower <= trueP && interval.upper >= trueP) {
      ctx.strokeStyle = "green";
    } else {
      ctx.strokeStyle = "red";
    }

    ctx.beginPath();
    ctx.moveTo(x, yLower);
    ctx.lineTo(x, yUpper);
    ctx.stroke();
  });

  // DOTS
  data.forEach((phat, i) => {
    let x = padding + i / storedData.length * (canvas.width - 2 * padding);
    let y = canvas.height - padding - phat * (canvas.height - 2 * padding);

    ctx.beginPath();
    ctx.arc(x, y, 3, 0, 2 * Math.PI);
    ctx.fillStyle = "blue";
    ctx.fill();
  });
}
</script>

</body>
</html>
